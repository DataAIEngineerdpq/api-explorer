<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>API Explorer</title>
  <style>
    body {
      font-family: system-ui, sans-serif;
      max-width: 900px;
      margin: 40px auto;
      padding: 0 20px;
      background: #0d1117;
      color: #e6edf3;
    }

    h1 { font-size: 20px; }

    .request-bar {
      display: flex;
      gap: 8px;
      margin-bottom: 16px;
    }

    #method {
      background: #1c2128;
      color: #e6edf3;
      border: 1px solid #3d444d;
      border-radius: 6px;
      padding: 0 12px;
      font-weight: bold;
    }

    #url {
      flex: 1;
      background: #1c2128;
      color: #e6edf3;
      border: 1px solid #3d444d;
      border-radius: 6px;
      padding: 10px 12px;
      font-family: monospace;
    }

    #send {
      background: #e8a33d;
      color: #1a1303;
      border: none;
      border-radius: 6px;
      padding: 10px 20px;
      font-weight: bold;
      cursor: pointer;
    }

    #response {
      background: #161b22;
      border: 1px solid #2d333b;
      border-radius: 6px;
      padding: 16px;
      overflow: auto;
      white-space: pre-wrap;
      word-break: break-all;
      font-family: monospace;
      font-size: 13px;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 16px;
      font-family: monospace;
      font-size: 13px;
    }

    th, td {
      text-align: left;
      padding: 8px 12px;
      border-bottom: 1px solid #2d333b;
    }

    th {
      color: #8b949e;
      font-weight: 600;
      border-bottom: 2px solid #3d444d;
    }

    td {
      color: #e6edf3;
      vertical-align: top;
    }

    .badge {
      display: inline-block;
      font-size: 11px;
      padding: 2px 8px;
      border-radius: 10px;
      margin: 2px 4px 2px 0;
      white-space: nowrap;
    }

    .badge-transform { background: #3a2e16; color: #e8c97d; }
    .badge-validate  { background: #3d1f1f; color: #f0a0a0; }
    .badge-enrich    { background: #16303a; color: #7dd3e8; }

    tr.has-actions td:first-child {
      border-left: 2px solid #e8a33d;
    }
    }
  </style>
</head>
<body>
  <h1>API Explorer</h1>

  <div class="request-bar">
    <select id="method">
      <option value="GET">GET</option>
      <option value="POST">POST</option>
      <option value="PUT">PUT</option>
      <option value="PATCH">PATCH</option>
      <option value="DELETE">DELETE</option>
    </select>

    <input type="text" id="url" placeholder="https://api.github.com/repos/python/cpython">

    <button id="send">Enviar</button>
  </div>

  <pre id="response">La respuesta aparecerá aquí…</pre>
  <table id="fields-table" style="display:none">
    <thead>
      <tr>
        <th>Campo</th>
        <th>Tipo crudo</th>
        <th>Tipo semántico</th>
        <th>Valor</th>
        <th>Acciones sugeridas</th>
      </tr>
    </thead>
    <tbody id="fields-body"></tbody>
  </table>
 
  <script>
    const sendButton = document.getElementById("send");
    const responseBox = document.getElementById("response");
    const fieldsTable = document.getElementById("fields-table");   // ← PIEZA 1 (nueva)
    const fieldsBody = document.getElementById("fields-body");     // ← PIEZA 1 (nueva)

    sendButton.addEventListener("click", async () => {
      const method = document.getElementById("method").value;
      const url = document.getElementById("url").value;

      if (!url) {
        responseBox.textContent = "Escribe una URL primero.";
        return;
      }

      responseBox.textContent = "Enviando…";

      try {
        const respuesta = await fetch("/api/proxy", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ method: method, url: url }),
        });

        const datos = await respuesta.json();
        responseBox.textContent = JSON.stringify(datos, null, 2);

        // ↓↓↓ PIEZA 2 (nueva): encadenar el aplanado y poblar la tabla
        if (datos.ok && datos.body) {
          let cuerpo;
          try {
            cuerpo = JSON.parse(datos.body);
          } catch {
            cuerpo = null; // el body no era JSON (ej. texto plano)
          }

          if (cuerpo !== null) {
            const res = await fetch("/api/flatten", {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify(cuerpo),
            });
            const analisis = await res.json();
            renderTable(analisis.fields);
          }
        }
        // ↑↑↑ PIEZA 2

      } catch (error) {
        responseBox.textContent = "Error al contactar el backend: " + error;
      }
    });

    // ↓↓↓ PIEZA 3 (nueva): función que construye la tabla
function renderTable(fields) {
      fieldsBody.innerHTML = "";

      fields.forEach((field) => {
        const tr = document.createElement("tr");
        const a = field.annotations;

        // Construir los badges de cada categoría
        let badges = "";
        a.transformations.forEach((t) => {
          badges += `<span class="badge badge-transform">${t}</span>`;
        });
        a.validations.forEach((v) => {
          badges += `<span class="badge badge-validate">${v}</span>`;
        });
        a.enrichments.forEach((e) => {
          badges += `<span class="badge badge-enrich">${e}</span>`;
        });

        // Resaltar la fila si tiene alguna acción pendiente
        const total = a.transformations.length + a.validations.length + a.enrichments.length;
        if (total > 0) {
          tr.classList.add("has-actions");
        }

        tr.innerHTML = `
          <td>${field.path}</td>
          <td>${field.type}</td>
          <td>${field.semanticType}</td>
          <td>${JSON.stringify(field.value)}</td>
          <td>${badges}</td>
        `;
        fieldsBody.appendChild(tr);
      });

      fieldsTable.style.display = "table";
    }
  </script>
</body>
</html>
